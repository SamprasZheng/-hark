# crypto/watchlist.yaml

Mirrors `watchlist/universe.yaml` for the crypto Top-100 tracker. Edit discipline:
before changing this file, snapshot it to
`crypto/watchlist_history/crypto-watchlist-YYYY-MM-DD.yaml` (tracked — point-in-time
integrity for any future backtest), exactly as `watchlist/history/` does for equities.

- `tier1_flagship` / `tier2_narrative_l1_l2` — the always-watch core; `tier3_discovery_pool`
  is grown from each day's movers/churn, never seeded speculatively.
- `category_tags` — the narrative map used to bucket the daily snapshot. A symbol may
  appear in several tags (BNB = l1 + exchange_token; RENDER = ai + depin). Anything in the
  snapshot that matches NO tag lands in `uncategorized` and is named in the analysis — that
  is how a genuinely new narrative gets noticed instead of silently dropped.
- `stablecoins` — excluded from "narrative" but tracked for stablecoin-share (a liquidity /
  risk-appetite gauge; also the depeg / counterparty watch surface).
- `human_overrides` — DOT and BTC are mandatory and always surfaced in every analysis.

These tag lists are a best-effort seed (2026-05); the `uncategorized` callout is the
self-correcting mechanism, so do not over-invest in making them exhaustive.
